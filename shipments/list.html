<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shipments - Airway Bills</title>
    <base href="/">
    <link rel="stylesheet" href="/styles.css">
    <script type="module" src="/js/themes.js"></script>
    <style>
        body {
            margin: 0;
            padding: 2px;
            font-family: 'MS Sans Serif', 'Arial', sans-serif;
            background: transparent;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
            min-height: 100vh;
        }
        .container {
            max-width: 100%;
            margin: 0;
            background: #C0C0C0;
            padding: 8px;
            border: 2px outset #C0C0C0;
        }
        h1 {
            margin-top: 0;
            color: #000000;
            font-size: 16px;
            font-weight: bold;
            font-family: 'MS Sans Serif', Arial, sans-serif;
        }
        .status-tabs {
            display: flex;
            gap: 4px;
            margin-top: 8px;
            border-bottom: 2px inset #C0C0C0;
            padding-bottom: 0;
        }
        .status-tab {
            padding: 4px 16px;
            background: #D4D4D4;
            border: 2px solid #808080;
            border-bottom: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: normal;
            color: #000000;
            font-family: 'MS Sans Serif', Arial, sans-serif;
            position: relative;
            top: 2px;
        }
        .status-tab:hover {
            background: #E8E8E8;
        }
        .status-tab:active {
            border: 2px solid #606060;
            background: #B0B0B0;
        }
        .status-tab.active {
            background: #B0B0B0;
            border-bottom: 2px solid #B0B0B0;
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #808080;
            font-weight: normal;
        }
        .status-tab .count {
            background: #808080;
            color: #FFFFFF;
            padding: 2px 6px;
            border: 1px inset #C0C0C0;
            font-size: 10px;
            margin-left: 4px;
            font-weight: normal;
        }
        .status-tab.active .count {
            background: #000080;
            color: white;
        }
        .shipments-list {
            margin-top: 12px;
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
            flex: 1;
        }
        .shipment-item {
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 4px 8px;
            margin-bottom: 8px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .shipment-item:hover {
            background: #eff6ff;
            color: inherit;
        }
        .shipment-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        .shipment-main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .shipment-header-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0;
            flex-wrap: wrap;
        }
        .shipment-awb {
            font-size: 12px;
            font-weight: bold;
            color: #000000;
        }
        .shipment-item:hover .shipment-awb {
            color: #000000;
        }
        .shipment-space-id {
            font-size: 10px;
            color: #000000;
            margin-top: 1px;
        }
        .shipment-item:hover .shipment-space-id {
            color: #000000;
        }
        .shipment-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #666;
            flex-wrap: wrap;
        }
        .shipment-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .shipment-meta-item strong {
            color: #333;
            font-weight: 500;
        }
        .shipment-status {
            padding: 1px 5px;
            border: 1px inset #C0C0C0;
            font-size: 9px;
            font-weight: normal;
            text-transform: uppercase;
            white-space: nowrap;
            background: #C0C0C0;
            color: #000000;
            line-height: 1.2;
        }
        .shipment-status-wrap {
            display: inline-flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }
        .shipment-table-status-cell {
            white-space: nowrap;
            vertical-align: middle;
        }
        .status-pending { background: #FFFFE0; color: #000000; }
        .status-active { background: #E0FFE0; color: #000000; }
        .status-in-transit { background: #E0E0FF; color: #000000; }
        .status-cancelled { background: #FFE0E0; color: #000000; }
        .substatus-badge {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 500;
            background: #e7f3ff;

        }
        .shipment-actions {
            display: flex;
            align-items: center;
            gap: 6px;

        }
        .btn-view, .btn-success, .btn-warning, .btn-danger {
            border: 2px solid #808080;

            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
            font-family: 'MS Sans Serif', Arial, sans-serif;
            background: #D4D4D4;
            color: #000000;
        }
        .btn-view {
            background: #C0C0C0;
            color: #000000;
        }
        .btn-view:hover {
            background: #E8E8E8;
        }
        .btn-view:active {
            border: 2px solid #606060;

        }
        #createSpaceBtn {

        #createSpaceBtn:hover {

        }

        }
        .btn-danger:hover {

        }

        }
        .empty-state {

        .empty-state h2 {

        /* ==========================

<body>
    <div class="container">
        <div class="shipments-page-toolbar">
            <h1>My Shipments</h1>
            <div class="shipments-toolbar-right">
                <div class="shipments-view-toggle" role="group" aria-label="Shipment row layout">
                    <button type="button" class="view-toggle-btn active" data-view="cards" id="viewCardsBtn" aria-pressed="true" title="Card layout">Cards</button>
                    <button type="button" class="view-toggle-btn" data-view="list" id="viewListBtn" aria-pressed="false" title="Table of shipment details">List</button>
                </div>
                <button id="createSpaceBtn" class="btn-view" style="display: none;">+ Create Shipment Space</button>
            </div>
        </div>
        
        <div class="status-tabs">
            <button class="status-tab active" data-status="pending" onclick="if(window.switchTab) window.switchTab('pending'); else console.error('switchTab not available yet');">
                Pending
                <span class="count" id="pending-count">0</span>
            </button>
            <button class="status-tab" data-status="active" onclick="if(window.switchTab) window.switchTab('active'); else console.error('switchTab not available yet');">
                Active
                <span class="count" id="active-count">0</span>
            </button>
            <button class="status-tab" data-status="in-transit" onclick="if(window.switchTab) window.switchTab('in-transit'); else console.error('switchTab not available yet');">
                In Transit
                <span class="count" id="in-transit-count">0</span>
            </button>
        </div>
        
        <div id="shipmentsList" class="shipments-list">
            <div class="empty-state">
                <h2>Loading shipments...</h2>
            </div>
        </div>
    </div>

    <!-- Load required scripts -->
    <script src="/models/user.js"></script>
    <script src="/models/shipment.js"></script>
    <script src="/js/roles.js"></script>
    <script type="module" src="/js/api.js"></script>
    <script type="module" src="/js/auth.js"></script>
    <script type="module" src="/js/shipments.js"></script>
    
    <script>
        // Define switchTab early to prevent errors when clicking tabs before page loads
        window.switchTab = function(status) {
            // Silently wait if page isn't ready - don't show warnings
            if (typeof currentTab === 'undefined' || typeof loadShipments !== 'function') {
                // Page not ready yet - just return silently
                // The function will be properly set up once DOMContentLoaded fires
                return;
            }
            currentTab = status;
            document.querySelectorAll('.status-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            const activeTab = document.querySelector(`.status-tab[data-status="${status}"]`);
            if (activeTab) {
                activeTab.classList.add('active');
            }
            loadShipments();
        };

        /** Safe value for HTML double-quoted attributes (e.g. data-space-id). */
        function escapeAttr(s) {
            return String(s ?? '')
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;');
        }

        /**
         * Open the shipment space page (dashboard iframe or standalone).
         * Defined before DOMContentLoaded so links work even if async init is slow; list.html has &lt;base href="/"&gt;.
         */
        window.viewShipmentSpace = function viewShipmentSpace(spaceId) {
            const q = 'spaceId=' + encodeURIComponent(String(spaceId));
            function spacePageHref(baseHref) {
                return new URL('shipments/space.html?' + q, baseHref).href;
            }
            if (window.parent && window.parent !== window) {
                try {
                    const contentFrame = window.parent.document.getElementById('contentFrame');
                    if (contentFrame) {
                        contentFrame.src = spacePageHref(window.parent.location.href);
                        return;
                    }
                } catch (e) {
                    /* cross-origin parent */
                }
                try {
                    window.parent.location.href = spacePageHref(window.parent.location.href);
                } catch (e2) {
                    window.location.href = new URL('space.html?' + q, window.location.href).href;
                }
            } else {
                window.location.href = new URL('space.html?' + q, window.location.href).href;
            }
        };
        
        // Wait for DOM to be ready
        document.addEventListener('DOMContentLoaded', async function() {
            const shipmentsListEl = document.getElementById('shipmentsList');
            if (shipmentsListEl) {
                shipmentsListEl.addEventListener('click', function (e) {
                    const btn = e.target.closest('button[data-space-id]');
                    if (!btn) return;
                    e.preventDefault();
                    const sid = btn.getAttribute('data-space-id');
                    if (sid === null || sid === '') return;
                    window.viewShipmentSpace(sid);
                });
            }

            // Wait for auth functions to be available
            let attempts = 0;
            while ((typeof isAuthenticated === 'undefined' || typeof getCurrentUser === 'undefined' || typeof getCurrentUserAsync === 'undefined') && attempts < 50) {
                await new Promise(resolve => setTimeout(resolve, 100));
                attempts++;
            }
            
            // Wait for API to be ready before calling getCurrentUser
            if (!window.usersAPI) {
                // Wait for apiReady event (max 5 seconds)
                await new Promise((resolve) => {
                    // Check if already available
                    if (window.usersAPI) {
                        resolve();
                        return;
                    }
                    
                    // Listen for apiReady event
                    const handler = () => {
                        if (window.usersAPI) {
                            resolve();
                        }
                    };
                    window.addEventListener('apiReady', handler, { once: true });
                    
                    // Also check periodically in case event already fired
                    let checks = 0;
                    const checkInterval = setInterval(() => {
                        checks++;
                        if (window.usersAPI) {
                            window.removeEventListener('apiReady', handler);
                            clearInterval(checkInterval);
                            resolve();
                        } else if (checks >= 50) { // 5 seconds (50 * 100ms)
                            clearInterval(checkInterval);
                            resolve();
                        }
                    }, 100);
                });
            }
            
            // Give auth.js module more time to set its internal usersAPI variable
            // Wait for the apiReady event to complete and auth.js to initialize
            await new Promise(resolve => setTimeout(resolve, 500));
            
            // Check authentication with error handling
            let user = null;
            try {
                // Skip isAuthenticated() check initially - it might fail if API isn't ready
                // Instead, try to get user directly from API
                
                // Try to get user - use window.usersAPI directly if module isn't ready
                if (window.usersAPI) {
                    try {
                        // Try direct API call first (most reliable)
                        if (window.usersAPI.getCurrent) {
                            try {
                                user = await window.usersAPI.getCurrent();
                            } catch (apiError) {
                                // Check if it's an authentication error (401) or network error
                                console.warn('API call failed:', apiError.message);
                                
                                // If it's not a 401 (unauthorized), try using cached data
                                // 401 means session expired, other errors might be temporary
                                if (!apiError.message.includes('401') && !apiError.message.includes('Unauthorized')) {
                                    // Try to use cached user if available
                                    const cachedUser = getCurrentUser();
                                    if (cachedUser) {
                                        console.log('Using cached user due to API error');
                                        user = cachedUser;
                                    }
                                }
                            }
                        }
                        
                        // If direct call didn't work, try async function
                        if (!user && typeof getCurrentUserAsync !== 'undefined') {
                            try {
                                user = await getCurrentUserAsync();
                            } catch (asyncError) {
                                console.warn('getCurrentUserAsync failed:', asyncError.message);
                                // Try cached user
                                const cachedUser = getCurrentUser();
                                if (cachedUser) {
                                    console.log('Using cached user after async function failed');
                                    user = cachedUser;
                                }
                            }
                        }
                    } catch (error) {
                        console.warn('Error getting user from API, trying sync version:', error);
                        // Fallback to sync version (uses cache)
                        await new Promise(resolve => setTimeout(resolve, 300));
                        user = getCurrentUser();
                    }
                } else {
                    // No API available yet, wait a bit more and try sync version
                    await new Promise(resolve => setTimeout(resolve, 300));
                    user = getCurrentUser();
                }
                
                // If still no user, check localStorage for auth data and try one more time
                if (!user) {
                    const authData = sessionStorage.getItem('awb_auth');
                    if (authData) {
                        try {
                            const auth = JSON.parse(authData);
                            if (auth.isAuthenticated && auth.userId) {
                                // User is authenticated but API call failed - try cached user first
                                const cachedUser = getCurrentUser();
                                if (cachedUser && cachedUser.id === auth.userId) {
                                    console.log('Using cached user from localStorage auth data');
                                    user = cachedUser;
                                } else {
                                    // If no cache, wait and retry API call
                                    console.warn('User authenticated but API call failed, retrying...');
                                    await new Promise(resolve => setTimeout(resolve, 1000));
                                    
                                    if (window.usersAPI && window.usersAPI.getCurrent) {
                                        try {
                                            user = await window.usersAPI.getCurrent();
                                        } catch (retryError) {
                                            console.warn('Retry also failed:', retryError.message);
                                            // Last resort: use cached user if available
                                            const lastCached = getCurrentUser();
                                            if (lastCached) {
                                                user = lastCached;
                                            }
                                        }
                                    }
                                }
                            }
                        } catch (e) {
                            // Invalid auth data
                        }
                    }
                }
                
                // Final check - if no user found, check localStorage directly
                if (!user) {
                    // Last attempt: check localStorage directly for user data
                    const authData = sessionStorage.getItem('awb_auth');
                    if (authData) {
                        try {
                            const auth = JSON.parse(authData);
                            if (auth.isAuthenticated && auth.userId) {
                                // Try getCurrentUser() first
                                const cachedUser = getCurrentUser();
                                if (cachedUser && cachedUser.id === auth.userId) {
                                    console.log('Using cached user as final fallback');
                                    user = cachedUser;
                                } else {
                                    // If getCurrentUser() doesn't work, check awb_users directly
                                    const usersJson = localStorage.getItem('awb_users');
                                    if (usersJson) {
                                        try {
                                            const users = JSON.parse(usersJson);
                                            const foundUser = users.find(u => u && u.id === auth.userId);
                                            if (foundUser) {
                                                console.log('Using user from localStorage awb_users as final fallback');
                                                user = foundUser;
                                            }
                                        } catch (e) {
                                            // Invalid users data
                                        }
                                    }
                                }
                            }
                        } catch (e) {
                            // Invalid auth data
                        }
                    }
                    
                    // Only redirect if we truly have no user
                    if (!user) {
                        console.error('No user found after authentication check');
                        window.location.href = '../login.html';
                        return;
                    }
                }
            } catch (error) {
                console.error('Authentication error:', error);
                window.location.href = '../login.html';
                return;
            }

            let currentTab = 'pending';

            const SHIPMENTS_LIST_VIEW_KEY = 'shipmentsListView';
            function getShipmentsListView() {
                try {
                    const v = localStorage.getItem(SHIPMENTS_LIST_VIEW_KEY);
                    return v === 'list' ? 'list' : 'cards';
                } catch (e) {
                    return 'cards';
                }
            }
            function setShipmentsListView(view) {
                const v = view === 'list' ? 'list' : 'cards';
                try {
                    localStorage.setItem(SHIPMENTS_LIST_VIEW_KEY, v);
                } catch (e) {}
                applyShipmentsListView();
                if (typeof loadShipments === 'function') {
                    void loadShipments();
                }
            }
            function applyShipmentsListView() {
                const el = document.getElementById('shipmentsList');
                const v = getShipmentsListView();
                if (el) {
                    el.classList.toggle('shipments-list--view-list', v === 'list');
                    el.classList.toggle('shipments-list--view-cards', v !== 'list');
                }
                document.querySelectorAll('.shipments-view-toggle .view-toggle-btn').forEach((btn) => {
                    const active = btn.getAttribute('data-view') === v;
                    btn.classList.toggle('active', active);
                    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
                });
            }

        // Show Create Space button for Issuing Carrier Agent only
        try {
            const createSpaceBtn = document.getElementById('createSpaceBtn');
            if (createSpaceBtn && user && user.role === 'issuing-carrier-agent') {
                    createSpaceBtn.style.display = 'block';
                    createSpaceBtn.addEventListener('click', function() {
                        // Check if we're in an iframe (dashboard)
                        if (window.parent && window.parent !== window && window.parent.document.getElementById('contentFrame')) {
                            // We're in the dashboard iframe - update the iframe src
                            window.parent.document.getElementById('contentFrame').src = 'shipments/create-space.html';
                        } else {
                            // We're not in an iframe - navigate directly
                            window.location.href = 'create-space.html';
                        }
                    });
                }
            } catch (error) {
                console.error('Error setting up create space button:', error);
            }

            try {
                const viewCardsBtn = document.getElementById('viewCardsBtn');
                const viewListBtn = document.getElementById('viewListBtn');
                if (viewCardsBtn) viewCardsBtn.addEventListener('click', () => setShipmentsListView('cards'));
                if (viewListBtn) viewListBtn.addEventListener('click', () => setShipmentsListView('list'));
                applyShipmentsListView();
            } catch (e) {
                console.warn('Shipments view toggle setup:', e);
            }

            // Switch between status tabs
            function switchTab(status) {
                currentTab = status;
                
                // Update tab buttons
                document.querySelectorAll('.status-tab').forEach(tab => {
                    tab.classList.remove('active');
                });
                const activeTab = document.querySelector(`.status-tab[data-status="${status}"]`);
                if (activeTab) {
                    activeTab.classList.add('active');
                }
                
                // Reload shipments
                loadShipments();
            }
            
            // Delete shipment from list
            async function deleteShipmentFromList(spaceId) {
                if (confirm('Are you sure you want to permanently delete this shipment space? This action cannot be undone.')) {
                    if (confirm('This is your final confirmation. The shipment will be permanently deleted.')) {
                        try {
                            // Wait for deleteShipment to be available
                            let attempts = 0;
                            while (typeof window.deleteShipment !== 'function' && attempts < 50) {
                                await new Promise(resolve => setTimeout(resolve, 100));
                                attempts++;
                            }
                            
                            if (typeof window.deleteShipment !== 'function') {
                                alert('Delete function not available. Please refresh the page.');
                                return;
                            }
                            
                            const result = await window.deleteShipment(spaceId);
                            if (result.success) {
                                alert('Shipment deleted successfully.');
                                loadShipments();
                            } else {
                                alert('Error: ' + result.message);
                            }
                        } catch (error) {
                            console.error('Error deleting shipment:', error);
                            alert('Error deleting shipment: ' + (error.message || 'Unknown error'));
                        }
                    }
                }
            }
            
            // Expose functions to global scope for onclick handlers IMMEDIATELY
            window.switchTab = switchTab;
            window.confirmShipmentAWB = confirmShipmentAWB;
            window.setStatus = setStatus;
            window.downloadFactoryInvoice = downloadFactoryInvoice;
            window.uploadFactoryInvoiceFile = uploadFactoryInvoiceFile;
            window.downloadShipmentPDF = downloadShipmentPDF;
            window.deleteShipmentFromList = deleteShipmentFromList;

            // Load and display shipments
            async function loadShipments() {
                if (!user || !user.id) {
                    console.error('User not available for loading shipments');
                    return;
                }
                
                // Wait for getUserShipments to be available (modules load asynchronously)
                let attempts = 0;
                while (typeof window.getUserShipments !== 'function' && attempts < 50) {
                    if (attempts === 0) {
                        console.warn('getUserShipments not available yet, waiting...');
                    }
                    await new Promise(resolve => setTimeout(resolve, 100));
                    attempts++;
                }
                if (typeof window.getUserShipments !== 'function') {
                    console.error('getUserShipments still not available after waiting');
                    return;
                }
                
                let shipments = [];
                try {
                    shipments = await window.getUserShipments(user.id);
                } catch (error) {
                    console.error('Error getting user shipments:', error);
                    shipments = [];
                }
                
                const usersMap = await loadUsersMapForShipments(shipments);
                
                const container = document.getElementById('shipmentsList');
                if (!container) {
                    console.error('Shipments list container not found');
                    return;
                }
                
                // Filter by status
                // Pending: status is 'pending' OR (status is 'active' but not confirmed) OR any other status that's not cancelled/deleted/in-transit
                // Active: status is 'active' AND isConfirmed is true
                // In Transit: status is 'in-transit'
                const pendingShipments = shipments.filter(s => {
                    if (s.status === 'cancelled' || s.status === 'deleted') return false;
                    if (s.status === 'in-transit') return false;
                    // Handle undefined isConfirmed - treat as false (not confirmed)
                    const isConfirmed = s.isConfirmed === true;
                    // Include pending, active (not confirmed), or any other status
                    return s.status === 'pending' || (s.status === 'active' && !isConfirmed) || (s.status !== 'active' && s.status !== 'in-transit');
                });
                
                const activeShipments = shipments.filter(s => {
                    if (s.status === 'cancelled' || s.status === 'deleted') return false;
                    // Only show if explicitly confirmed
                    return s.status === 'active' && s.isConfirmed === true;
                });
                
                const inTransitShipments = shipments.filter(s => {
                    if (s.status === 'cancelled' || s.status === 'deleted') return false;
                    return s.status === 'in-transit';
                });
                
                // Update counts
                document.getElementById('pending-count').textContent = pendingShipments.length;
                document.getElementById('active-count').textContent = activeShipments.length;
                document.getElementById('in-transit-count').textContent = inTransitShipments.length;
                
                // Get shipments for current tab
                let displayShipments = [];
                if (currentTab === 'pending') {
                    displayShipments = pendingShipments;
                } else if (currentTab === 'active') {
                    displayShipments = activeShipments;
                } else if (currentTab === 'in-transit') {
                    displayShipments = inTransitShipments;
                }
                
                // Fallback: Show all non-cancelled/non-deleted shipments in pending if they don't match any category
                // This handles edge cases where shipments might have unexpected status values or missing isConfirmed
                if (displayShipments.length === 0 && shipments.length > 0 && currentTab === 'pending') {
                    // Get all shipments that aren't cancelled or deleted and aren't already in a category
                    const allValidShipments = shipments.filter(s => {
                        if (s.status === 'cancelled' || s.status === 'deleted') return false;
                        // Check if already categorized
                        const inPending = s.status === 'pending' || (s.status === 'active' && s.isConfirmed !== true) || (s.status !== 'active' && s.status !== 'in-transit');
                        const inActive = s.status === 'active' && s.isConfirmed === true;
                        const inTransit = s.status === 'in-transit';
                        return !inPending && !inActive && !inTransit;
                    });
                    
                    // If we have valid shipments but they're not showing, add them to pending
                    if (allValidShipments.length > 0) {
                        displayShipments = [...pendingShipments, ...allValidShipments];
                        console.log('Fallback: Added', allValidShipments.length, 'unmatched shipments to pending tab');
                    }
                }
                
                if (displayShipments.length === 0) {
                    const messages = {
                        'pending': 'No pending shipments',
                        'active': 'No active shipments',
                        'in-transit': 'No shipments in transit'
                    };
                    container.innerHTML = `
                        <div class="empty-state">
                            <h2>${messages[currentTab]}</h2>
                            <p>${user.role === 'issuing-carrier-agent' && currentTab === 'pending' ? 'Create your first shipment space to get started!' : 'Shipments will appear here when available.'}</p>
                        </div>
                    `;
                    applyShipmentsListView();
                    return;
                }
                
                const useTable = getShipmentsListView() === 'list';
                let html;
                if (useTable) {
                    html = `
                        <table class="shipments-data-table" role="grid" aria-label="Shipments">
                            <thead>
                                <tr>
                                    <th scope="col">AWB</th>
                                    <th scope="col">Space ID</th>
                                    <th scope="col">Shipper</th>
                                    <th scope="col">Consignee</th>
                                    <th scope="col">Status</th>
                                    <th scope="col">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${displayShipments.map((shipment) => renderShipmentListRow(shipment, usersMap)).join('')}
                            </tbody>
                        </table>`;
                } else {
                    html = displayShipments.map((shipment) => renderShipmentItem(shipment, usersMap)).join('');
                }
                container.innerHTML = html;
                applyShipmentsListView();
            }
            
            async function loadUsersMapForShipments(shipments) {
                const map = new Map();
                let uWait = 0;
                while (!window.usersAPI && uWait < 40) {
                    await new Promise((r) => setTimeout(r, 100));
                    uWait++;
                }
                if (!window.usersAPI) return map;
                try {
                    if (typeof window.usersAPI.getAll === 'function') {
                        const all = await window.usersAPI.getAll();
                        if (Array.isArray(all) && all.length > 0) {
                            all.forEach((u) => {
                                if (u && u.id != null) map.set(String(u.id), u);
                            });
                            return map;
                        }
                    }
                } catch (e) {
                    console.warn('Could not load users list for shipment party labels:', e);
                }
                const ids = new Set();
                (shipments || []).forEach((s) => {
                    (s.participants || []).forEach((p) => {
                        if (p && p.userId && (p.role === 'shipper' || p.role === 'consignee')) {
                            ids.add(String(p.userId));
                        }
                    });
                });
                if (typeof window.usersAPI.getById !== 'function' || ids.size === 0) return map;
                await Promise.all(
                    [...ids].map(async (id) => {
                        try {
                            const u = await window.usersAPI.getById(id);
                            if (u && u.id != null) map.set(String(u.id), u);
                        } catch (e) {
                            /* ignore */
                        }
                    })
                );
                return map;
            }
            
            function escapeHtml(str) {
                return String(str ?? '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');
            }
            
            function getParticipantUserId(participants, role) {
                const p = (participants || []).find((x) => x && x.role === role);
                return p && p.userId != null ? String(p.userId) : '';
            }
            
            /** Display name from the logged-in user account (not AWB contacts). */
            function resolveAccountUserName(usersMap, userId) {
                if (!userId) return '';
                const u = usersMap.get(String(userId));
                if (!u) return '';
                const n = (u.name || u.company || u.companyName || '').trim();
                if (n) return n;
                return (u.email || '').trim() || '';
            }
            
            function buildShipperConsigneePartyHtml(shipment, usersMap) {
                const participants = shipment.participants || [];
                const shipperUid = getParticipantUserId(participants, 'shipper');
                const consigneeUid = getParticipantUserId(participants, 'consignee');
                const um = usersMap instanceof Map ? usersMap : new Map();
                const shipper = resolveAccountUserName(um, shipperUid);
                const consignee = resolveAccountUserName(um, consigneeUid);
                const shipperDisp = shipper || '—';
                const consigneeDisp = consignee || '—';
                const tip = `Shipper: ${shipperDisp} · Consignee: ${consigneeDisp}`;
                return `
                    <span class="shipment-party-line" title="${escapeHtml(tip)}">
                        <span class="shipment-party"><strong>Shipper:</strong> ${escapeHtml(shipperDisp)}</span>
                        <span class="shipment-party-sep" aria-hidden="true">·</span>
                        <span class="shipment-party"><strong>Consignee:</strong> ${escapeHtml(consigneeDisp)}</span>
                    </span>
                `;
            }

            function safeIdSegment(s) {
                return String(s ?? '').replace(/[^a-zA-Z0-9_-]/g, '_');
            }

            function renderShipmentListRow(shipment, usersMap) {
                const participants = shipment.participants || [];
                const spaceId = shipment.spaceId || 'N/A';
                const sidJs = JSON.stringify(String(spaceId));
                const hasAwb = shipment.awbNumber != null && String(shipment.awbNumber).trim() !== '';
                const awbNumber = hasAwb ? String(shipment.awbNumber).trim() : '';

                const isAgent = user.role === 'issuing-carrier-agent' || user.role === 'admin';
                const isConsignee = user.role === 'consignee';
                const isCourier = user.role === 'courier';
                const isShipper = user.role === 'shipper';
                const isAdmin = user.role === 'admin';
                const um = usersMap instanceof Map ? usersMap : new Map();
                const shipperUid = getParticipantUserId(participants, 'shipper');
                const consigneeUid = getParticipantUserId(participants, 'consignee');
                const shipperDisp = escapeHtml(resolveAccountUserName(um, shipperUid) || '—');
                const consigneeDisp = escapeHtml(resolveAccountUserName(um, consigneeUid) || '—');

                let displayStatus = shipment.status;
                if (shipment.status === 'active' && !shipment.isConfirmed) {
                    displayStatus = 'pending';
                }

                let substatusDisplay = '';
                if (shipment.subStatus) {
                    const substatusLabels = {
                        'at-destination': 'At Destination',
                        'ready-for-pickup': 'Ready for Pickup',
                        'delivered': 'Delivered'
                    };
                    substatusDisplay = `<span class="substatus-badge">${substatusLabels[shipment.subStatus] || shipment.subStatus}</span>`;
                }

                const canDelete = (isAgent || isAdmin) &&
                    shipment.status !== 'deleted' &&
                    shipment.status !== 'in-transit';

                const actionsParts = [];
                if (canDelete) {
                    actionsParts.push(`<button class="btn-danger" onclick="deleteShipmentFromList(${sidJs})" style="padding: 4px 10px; font-size: 11px;">Delete</button>`);
                }

                let factoryInvoiceBlock = '';
                const invId = 'invoice-table-' + safeIdSegment(spaceId);

                if (currentTab === 'pending') {
                    const confirmButton = ((isAgent || isAdmin) && shipment.awbNumber && !shipment.isConfirmed)
                        ? `<button class="btn-success" onclick="confirmShipmentAWB(${sidJs})" style="padding: 4px 10px; font-size: 11px;">Confirm</button>`
                        : '';
                    if (confirmButton) actionsParts.push(confirmButton);
                }

                if (currentTab === 'active') {
                    if (shipment.pdfBase64 && shipment.isShared) {
                        actionsParts.push(`<button class="btn-success" onclick="downloadShipmentPDF(${sidJs})">Download PDF</button>`);
                    }
                    if (isShipper || isConsignee || isAgent) {
                        factoryInvoiceBlock = shipment.factoryInvoice ? `
                            <div class="list-row-invoice">
                                <span style="color: #666;">Export Invoice: </span>
                                <button class="btn-view" onclick="downloadFactoryInvoice(${sidJs})" style="background: #28a745; padding: 4px 10px; font-size: 11px;">Download</button>
                                <span style="margin-left: 8px; color: #999; font-size: 11px;">
                                    ${shipment.factoryInvoiceUploadedAt ? new Date(shipment.factoryInvoiceUploadedAt).toLocaleDateString() : ''}
                                </span>
                            </div>
                        ` : `
                            <div class="list-row-invoice">
                                <span style="color: #666;">Export Invoice: </span>
                                <div class="file-input-wrapper" style="display: inline-block;">
                                    <input type="file" id="${invId}" accept=".pdf,.jpg,.jpeg,.png" onchange="uploadFactoryInvoiceFile(${sidJs}, this)">
                                    <label for="${invId}" class="file-input-label">Upload</label>
                                </div>
                            </div>
                        `;
                    }
                    if (isAgent) {
                        actionsParts.push(`<button class="btn-warning" onclick="setStatus(${sidJs}, 'in-transit', null)" style="padding: 4px 10px; font-size: 11px;">Mark as In Transit</button>`);
                    }
                }

                if (currentTab === 'in-transit') {
                    if (shipment.pdfBase64 && shipment.isShared) {
                        actionsParts.push(`<button class="btn-success" onclick="downloadShipmentPDF(${sidJs})">Download PDF</button>`);
                    }
                    if (isConsignee || isAgent) {
                        actionsParts.push(`<button class="btn-warning" onclick="setStatus(${sidJs}, 'in-transit', 'at-destination')" style="padding: 4px 10px; font-size: 11px;">At Destination</button>`);
                        actionsParts.push(`<button class="btn-warning" onclick="setStatus(${sidJs}, 'in-transit', 'ready-for-pickup')" style="padding: 4px 10px; font-size: 11px;">Ready for Pickup</button>`);
                    }
                    if (isConsignee || isCourier) {
                        actionsParts.push(`<button class="btn-success" onclick="setStatus(${sidJs}, 'in-transit', 'delivered')" style="padding: 4px 10px; font-size: 11px;">Delivered</button>`);
                    }
                }

                const awbCell = hasAwb
                    ? `<button type="button" class="shipment-table-link" data-space-id="${escapeAttr(spaceId)}">${escapeHtml(awbNumber)}</button>`
                    : `<span class="shipment-table-muted">—</span>`;

                const actionsHtml = `<div class="list-row-actions">${actionsParts.join('')}</div>${factoryInvoiceBlock}`;

                return `
                    <tr class="shipment-table-row">
                        <td>${awbCell}</td>
                        <td><button type="button" class="shipment-table-link" data-space-id="${escapeAttr(spaceId)}">${escapeHtml(String(spaceId))}</button></td>
                        <td>${shipperDisp}</td>
                        <td>${consigneeDisp}</td>
                        <td class="shipment-table-status-cell">
                            <span class="shipment-status-wrap">
                                <span class="shipment-status status-${displayStatus}">${displayStatus.replace('-', ' ')}</span>${substatusDisplay}
                            </span>
                        </td>
                        <td class="shipment-table-cell-actions">${actionsHtml}</td>
                    </tr>
                `;
            }

            function renderShipmentItem(shipment, usersMap) {
                const participants = shipment.participants || [];
                const spaceId = shipment.spaceId || 'N/A';
                const sidJs = JSON.stringify(String(spaceId));
                const hasAwb = shipment.awbNumber != null && String(shipment.awbNumber).trim() !== '';
                const awbDisplayText = hasAwb ? String(shipment.awbNumber).trim() : '';
                const isAgent = user.role === 'issuing-carrier-agent' || user.role === 'admin';
                const isConsignee = user.role === 'consignee';
                const isCourier = user.role === 'courier';
                const isShipper = user.role === 'shipper';
                const isAdmin = user.role === 'admin';
                const um = usersMap instanceof Map ? usersMap : new Map();
                const partyLineHtml = buildShipperConsigneePartyHtml(shipment, um);
                const invIdCard = 'invoice-' + safeIdSegment(spaceId);

                let displayStatus = shipment.status;
                if (shipment.status === 'active' && !shipment.isConfirmed) {
                    displayStatus = 'pending';
                }

                let buttons = '';
                let statusActions = '';
                let factoryInvoiceSection = '';

                const canDelete = (isAgent || isAdmin) &&
                    shipment.status !== 'deleted' &&
                    shipment.status !== 'in-transit';
                if (canDelete) {
                    buttons += `<button class="btn-danger" onclick="deleteShipmentFromList(${sidJs})" style="padding: 4px 10px; font-size: 11px;">Delete</button>`;
                }

                if (currentTab === 'pending') {
                    const confirmButton = ((isAgent || isAdmin) && shipment.awbNumber && !shipment.isConfirmed)
                        ? `<button class="btn-success" onclick="confirmShipmentAWB(${sidJs})" style="padding: 4px 10px; font-size: 11px;">Confirm</button>`
                        : '';

                    statusActions = `
                        <div class="status-actions">
                            <div class="status-actions-buttons">
                                ${confirmButton}
                            </div>
                            ${partyLineHtml}
                        </div>
                    `;
                }

                if (currentTab === 'active') {
                    if (shipment.pdfBase64 && shipment.isShared) {
                        buttons += `<button class="btn-success" onclick="downloadShipmentPDF(${sidJs})">Download PDF</button>`;
                    }

                    if (isShipper || isConsignee || isAgent) {
                        factoryInvoiceSection = `
                            <div class="factory-invoice-section">
                                ${shipment.factoryInvoice ? `
                                    <span style="color: #666;">Export Invoice: </span>
                                    <button class="btn-view" onclick="downloadFactoryInvoice(${sidJs})" style="background: #28a745; padding: 4px 10px; font-size: 11px;">Download</button>
                                    <span style="margin-left: 8px; color: #999; font-size: 11px;">
                                        ${shipment.factoryInvoiceUploadedAt ? new Date(shipment.factoryInvoiceUploadedAt).toLocaleDateString() : ''}
                                    </span>
                                ` : `
                                    <span style="color: #666;">Export Invoice: </span>
                                    <div class="file-input-wrapper" style="display: inline-block;">
                                        <input type="file" id="${invIdCard}" accept=".pdf,.jpg,.jpeg,.png" onchange="uploadFactoryInvoiceFile(${sidJs}, this)">
                                        <label for="${invIdCard}" class="file-input-label">Upload</label>
                                    </div>
                                `}
                            </div>
                        `;
                    }

                    statusActions = `
                        <div class="status-actions">
                            <div class="status-actions-buttons">
                                ${isAgent ? `<button class="btn-warning" onclick="setStatus(${sidJs}, 'in-transit', null)" style="padding: 4px 10px; font-size: 11px;">Mark as In Transit</button>` : ''}
                            </div>
                            ${partyLineHtml}
                        </div>
                    `;
                }

                if (currentTab === 'in-transit') {
                    if (shipment.pdfBase64 && shipment.isShared) {
                        buttons += `<button class="btn-success" onclick="downloadShipmentPDF(${sidJs})">Download PDF</button>`;
                    }

                    statusActions = `
                        <div class="status-actions">
                            <div class="status-actions-buttons">
                                ${(isConsignee || isAgent) ? `<button class="btn-warning" onclick="setStatus(${sidJs}, 'in-transit', 'at-destination')" style="padding: 4px 10px; font-size: 11px;">At Destination</button>` : ''}
                                ${(isConsignee || isAgent) ? `<button class="btn-warning" onclick="setStatus(${sidJs}, 'in-transit', 'ready-for-pickup')" style="padding: 4px 10px; font-size: 11px;">Ready for Pickup</button>` : ''}
                                ${(isConsignee || isCourier) ? `<button class="btn-success" onclick="setStatus(${sidJs}, 'in-transit', 'delivered')" style="padding: 4px 10px; font-size: 11px;">Delivered</button>` : ''}
                            </div>
                            ${partyLineHtml}
                        </div>
                    `;
                }

                let substatusDisplay = '';
                if (shipment.subStatus) {
                    const substatusLabels = {
                        'at-destination': 'At Destination',
                        'ready-for-pickup': 'Ready for Pickup',
                        'delivered': 'Delivered'
                    };
                    substatusDisplay = `<span class="substatus-badge">${substatusLabels[shipment.subStatus] || shipment.subStatus}</span>`;
                }

                const awbHeaderHtml = hasAwb
                    ? `<button type="button" class="shipment-table-link shipment-awb-link" data-space-id="${escapeAttr(spaceId)}">AWB: ${escapeHtml(awbDisplayText)}</button>`
                    : `<button type="button" class="shipment-table-link shipment-awb-link" data-space-id="${escapeAttr(spaceId)}">Space ID: ${escapeHtml(String(spaceId))}</button>`;

                const spaceLineHtml = hasAwb
                    ? `<div class="shipment-space-id"><button type="button" class="shipment-table-link" data-space-id="${escapeAttr(spaceId)}">Space ID: ${escapeHtml(String(spaceId))}</button></div>`
                    : '';

                return `
                    <div class="shipment-item">
                        <div class="shipment-content">
                            <div class="shipment-main">
                                <div>
                                    <div class="shipment-header-row">
                                        <div class="shipment-awb">
                                            ${awbHeaderHtml}
                                        </div>
                                        <div class="shipment-status-wrap">
                                            <span class="shipment-status status-${displayStatus}">${displayStatus.replace('-', ' ')}</span>
                                            ${substatusDisplay}
                                        </div>
                                    </div>
                                    ${spaceLineHtml}
                                </div>
                                ${factoryInvoiceSection}
                                ${statusActions}
                            </div>
                        </div>
                        <div class="shipment-actions">
                            ${buttons}
                        </div>
                    </div>
                `;
            }
            
            async function confirmShipmentAWB(spaceId) {
                if (confirm('Are you sure you want to confirm this AWB? Once confirmed, it will move to Active status.')) {
                    const result = await window.confirmAWB(spaceId);
                    if (result.success) {
                        alert('AWB confirmed successfully!');
                        loadShipments();
                    } else {
                        alert('Error: ' + result.message);
                    }
                }
            }
            
            function setStatus(spaceId, status, subStatus) {
                const result = window.setShipmentStatus(spaceId, status, subStatus);
                if (result.success) {
                    alert('Status updated successfully!');
                    loadShipments();
                } else {
                    alert('Error: ' + result.message);
                }
            }
            
            async function uploadFactoryInvoiceFile(spaceId, input) {
                const file = input.files[0];
                if (!file) return;
                
                // Check file size (max 10MB)
                if (file.size > 10 * 1024 * 1024) {
                    alert('File size must be less than 10MB');
                    input.value = '';
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64 = e.target.result.split(',')[1]; // Remove data:type;base64, prefix
                    Promise.resolve(window.uploadFactoryInvoice(spaceId, {
                        fileBase64: base64,
                        mimeType: file.type || 'application/pdf',
                        fileName: file.name || null
                    }))
                        .then(result => {
                            if (result && result.success) {
                                alert('Factory invoice uploaded successfully!');
                                loadShipments();
                            } else {
                                alert('Error: ' + (result && result.message ? result.message : 'Unknown error'));
                                input.value = '';
                            }
                        })
                        .catch(error => {
                            console.error('Error uploading factory invoice:', error);
                            alert('Error: ' + (error.message || 'Unknown error'));
                            input.value = '';
                        });
                };
                reader.onerror = function() {
                    alert('Error reading file');
                    input.value = '';
                };
                reader.readAsDataURL(file);
            }
            
            function downloadFactoryInvoice(spaceId) {
                const shipment = getShipmentBySpaceId(spaceId);
                if (!shipment || !shipment.factoryInvoice) {
                    alert('Factory invoice not available');
                    return;
                }
                
                try {
                    const binaryString = atob(shipment.factoryInvoice);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    const mimeType = shipment.factoryInvoiceMimeType || 'application/pdf';
                    const blob = new Blob([bytes], { type: mimeType });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const extension = mimeType.startsWith('image/') ? (mimeType === 'image/jpeg' ? '.jpg' : `.${mimeType.split('/')[1] || 'bin'}`) : '.pdf';
                    a.download = shipment.factoryInvoiceFileName || `Factory_Invoice_${shipment.awbNumber || shipment.spaceId}${extension}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } catch (error) {
                    console.error('Error downloading invoice:', error);
                    alert('Error downloading invoice: ' + error.message);
                }
            }
            
            function downloadShipmentPDF(identifier) {
                let shipment = getShipmentBySpaceId(identifier);
                if (!shipment) {
                    shipment = getShipmentByAWB(identifier);
                }
                
                if (!shipment || !shipment.pdfBase64) {
                    alert('PDF not available for this shipment.');
                    return;
                }
                
                try {
                    const binaryString = atob(shipment.pdfBase64);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    const blob = new Blob([bytes], { type: 'application/pdf' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const awbNumber = shipment.awbNumber || shipment.spaceId;
                    a.download = `AWB-${awbNumber}.pdf`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } catch (error) {
                    console.error('Error downloading PDF:', error);
                    alert('Error downloading PDF: ' + error.message);
                }
            }
            
            // Load shipments on page load
            try {
                if (user && user.id) {
                    loadShipments();
                } else {
                    console.error('Cannot load shipments: user not available');
                }
            } catch (error) {
                console.error('Error loading shipments:', error);
                const container = document.getElementById('shipmentsList');
                if (container) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h2>Error loading shipments</h2>
                            <p>Please refresh the page. If the problem persists, check the browser console.</p>
                        </div>
                    `;
                    applyShipmentsListView();
                }
            }
        }); // End DOMContentLoaded
    </script>
</body>
</html>
